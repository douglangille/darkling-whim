name: Post to Bluesky

on:
  schedule:
    # Sunday 8:00 AM UTC (adjust timezone as needed)
    # Sun = day 0, so cron is: minute hour * * 0
    - cron: "0 8 * * 0"
  workflow_dispatch: # Allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @atproto/api xml2js node-fetch

      - name: Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: node post-to-bluesky.js
